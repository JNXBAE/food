<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews — Jungle Foods</title>
<meta name="description" content="Read what guests say about Jungle Foods, and leave your own review.">
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="reviews">

<div class="page-loader"><img src="assets/logo.png" alt="Loading"><span>Reading the Reviews…</span></div>
<div class="scroll-progress" id="scrollProgress"></div>

<header class="navbar" id="siteNav">
  <div class="container nav-inner">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="Jungle Foods logo">
      <span class="brand-name">Jungle Foods<span>MANDI · BIRIYANI · MULTI-CUISINE</span></span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html" data-page="home">Home</a>
      <a href="menu.html" data-page="menu">Menu</a>
      <a href="about.html" data-page="about">About</a>
      <a href="gallery.html" data-page="gallery">Gallery</a>
      <a href="reviews.html" data-page="reviews">Reviews</a>
      <a href="contact.html" data-page="contact">Contact</a>
    </nav>
    <div class="nav-cta">
      <a href="menu.html" class="btn btn-primary btn-sm">Order Now</a>
      <button class="cart-btn" id="cartToggle" aria-label="Open cart">🧺<span class="cart-count">0</span></button>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
    </div>
  </div>
</header>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a> / <span>Reviews</span></div>
    <div class="eyebrow" style="justify-content:center;">4.7 out of 5 · 1,200+ reviews</div>
    <h1>What Our Guests Say</h1>
  </div>
</section>

<section class="section-tight">
  <div class="container">
    <div class="review-grid" id="reviewGrid"></div>
    <div style="text-align:center;margin-top:24px;">
      <button class="btn btn-outline" id="loadMoreBtn">Load More Reviews</button>
    </div>
  </div>
</section>

<section class="section canopy-bg" style="background:rgba(255,255,255,.02);">
  <div class="container" style="max-width:640px;">
    <div class="section-head">
      <div class="eyebrow">Tell us how we did</div>
      <h2>Leave a Review</h2>
    </div>
    <form class="styled card" id="reviewForm">
      <div class="form-row">
        <div><label>Your Name</label><input type="text" required placeholder="e.g. Priya S."></div>
        <div><label>Phone or Email</label><input type="text" required placeholder="For order verification"></div>
      </div>
      <div>
        <label>Your Rating</label>
        <div class="star-picker" id="starPicker">
          <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
        </div>
      </div>
      <div>
        <label>Your Feedback</label>
        <textarea required placeholder="Tell us about your experience…"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Submit Review</button>
    </form>
  </div>
</section>

<footer class="footer" id="siteFooter"></footer>

<div class="cart-overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <h3 style="margin:0;">Your Basket</h3>
    <button class="cart-close" id="cartClose" aria-label="Close cart">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total-row"><span>Total</span><span id="cartTotal">₹0</span></div>
    <button class="btn btn-primary btn-block" id="checkoutBtn">Checkout via WhatsApp</button>
  </div>
</aside>

<button class="back-top" id="backTop" aria-label="Back to top">↑</button>

<script src="js/main.js"></script>
<script src="js/footer.js"></script>
<script>
const allReviews = [
  {name:'Arun K.', initials:'AK', stars:5, text:"The Al Faham Mandi tastes just like Kuwait! Portion sizes are generous and delivery is quick."},
  {name:'Divya R.', initials:'DR', stars:5, text:"Best mocktails on the highway — the Blueberry Mojito is unreal. Great spot for a family dinner."},
  {name:'Mohamed I.', initials:'MI', stars:4, text:"Chicken 65 Biriyani is packed with flavour. Service is fast even on busy weekend nights."},
  {name:'Sneha P.', initials:'SP', stars:5, text:"Ordered the Bucket Biriyani for a family gathering — everyone loved it. Will order again."},
  {name:'Karthik V.', initials:'KV', stars:4, text:"Great Kothu Parotta and the Jungle Special Falooda is a must-try dessert."},
  {name:'Fathima N.', initials:'FN', stars:5, text:"Clean, friendly staff and the Shawarma Roll is generously stuffed. Highly recommend."},
  {name:'Ramesh T.', initials:'RT', stars:5, text:"Stopped here on a highway drive and ended up staying for dessert. The Cold Coffee is excellent."},
  {name:'Anitha S.', initials:'AS', stars:4, text:"Tandoori Chicken Mandi was smoky and perfectly spiced. Quick service for a Sunday crowd."},
];
const grid = document.getElementById('reviewGrid');
let shown = 3;
function render(){
  grid.innerHTML = allReviews.slice(0, shown).map(r => `
    <div class="card review-card reveal in">
      <div class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
      <p>"${r.text}"</p>
      <div class="review-who">
        <div class="review-avatar">${r.initials}</div>
        <div><strong>${r.name}</strong><br><small>Verified Diner</small></div>
      </div>
    </div>`).join('');
  document.getElementById('loadMoreBtn').style.display = shown >= allReviews.length ? 'none' : 'inline-flex';
}
document.getElementById('loadMoreBtn').addEventListener('click', () => { shown += 3; render(); });
render();

let rating = 0;
document.querySelectorAll('#starPicker span').forEach(s => {
  s.addEventListener('click', () => {
    rating = +s.dataset.v;
    document.querySelectorAll('#starPicker span').forEach(x => x.classList.toggle('on', +x.dataset.v <= rating));
  });
});
document.getElementById('reviewForm').addEventListener('submit', (e) => {
  e.preventDefault();
  if(rating === 0){ JF.toast('Please select a star rating'); return; }
  JF.toast('Thanks! Your review has been submitted.');
  e.target.reset();
  rating = 0;
  document.querySelectorAll('#starPicker span').forEach(x => x.classList.remove('on'));
});
</script>
</body>
</html>
